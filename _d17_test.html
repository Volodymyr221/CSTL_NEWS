<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<link rel="stylesheet" href="style/base.css">
<link rel="stylesheet" href="style/modal.css">
<link rel="stylesheet" href="style/community.css">
<style>body{margin:0;height:844px;background:#333}</style>
</head><body>
<div class="app-modal app-modal--sheet app-modal--board-compose open" style="position:fixed;inset:0;display:flex;align-items:flex-end;justify-content:center">
  <div class="app-modal-backdrop"></div>
  <div class="app-modal-sheet" role="dialog">
    <div class="app-modal-handle"></div>
    <button class="app-modal-close" type="button">✕</button>
    <div class="app-modal-body">
      <h3 class="cm-board-modal-title"><span class="cm-board-title-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></span>Нове оголошення</h3>
      <p class="cm-board-modal-sub">Заповніть поля нижче.</p>
      <form>
        <div class="bm-section"><label class="bm-label">Категорія</label><div class="bm-chips">
          <button type="button" class="bm-chip active"><span class="bm-chip-emoji">🛒</span><span class="bm-chip-label">Куплю</span></button>
          <button type="button" class="bm-chip"><span class="bm-chip-emoji">🏷️</span><span class="bm-chip-label">Продам</span></button>
          <button type="button" class="bm-chip"><span class="bm-chip-emoji">🔧</span><span class="bm-chip-label">Послуги</span></button>
        </div></div>
        <div class="bm-section"><label class="bm-label">Заголовок *</label><input class="cm-board-input" placeholder="Напр. Продам мотоцикл"></div>
        <div class="bm-section"><label class="bm-label">Опис</label><textarea class="cm-board-input" rows="4"></textarea></div>
        <div class="bm-section"><label class="bm-label">Контакт</label><input class="cm-board-input"></div>
      </form>
    </div>
  </div>
</div>
</body></html>
