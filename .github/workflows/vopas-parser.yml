# Парсер розкладу автобусів з vopas.com.ua → data/schedule.json
# Запускається кожні 30 хвилин: підхоплює скасування рейсів і зміни статусу.
# Якщо VOPAS не відповів — schedule.json НЕ перезаписується (захист від обнулення).

name: VOPAS parser

on:
  workflow_dispatch: {}   # ручний запуск з UI
  schedule:
    - cron: '*/30 * * * *'  # кожні 30 хвилин (UTC)

permissions:
  contents: write   # для git push data/vopas-fetched.json
  actions:  write   # для gh workflow run deploy.yml (потім, коли інтегруємо)

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: vopas-parser
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # повна історія — потрібна для rebase перед push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet beautifulsoup4

      - name: Run VOPAS parser
        run: python scripts/parse_vopas.py

      - name: Dump parsed JSON (preview)
        if: always()
        run: |
          if [ -f data/vopas-fetched.json ]; then
            echo "=== data/vopas-fetched.json (перші 80 рядків) ==="
            head -80 data/vopas-fetched.json
            echo ""
            echo "=== Кількість рейсів ==="
            python3 -c "import json; d=json.load(open('data/vopas-fetched.json')); print(f'routes: {len(d.get(\"routes\",[]))}'); print(f'errors: {len(d.get(\"errors\",[])) }')"
          fi

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data/schedule.json data/vopas-fetched.json)" ]; then
            git config user.name  "vopas-parser-bot"
            git config user.email "vopas-parser@cstl-news.local"
            git add data/schedule.json data/vopas-fetched.json
            git -c commit.gpgsign=false commit -m "auto(vopas): розклад автобусів $(date -u +'%d.%m %H:%M UTC')"
            # main міг зрушити поки парсер працював (auto-news cron / auto-merge).
            # Підтягуємо свіжий main, rebase наш коміт зверху, push. Retry x3.
            pushed=false
            for i in 1 2 3; do
              git fetch origin main
              if git rebase origin/main && git push origin HEAD:main; then
                echo "✓ push успішний (спроба $i)"
                pushed=true
                break
              fi
              echo "⚠️ спроба $i не вдалась, повтор..."
              git rebase --abort 2>/dev/null || true
              sleep 3
            done
            # Тригеримо деплой щоб сайт показав свіжий розклад
            if [ "$pushed" = true ]; then
              gh workflow run deploy.yml --ref main || echo "deploy trigger failed (не критично)"
            fi
          else
            echo "Розклад без змін — нічого комітити"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
