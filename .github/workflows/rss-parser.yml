name: RSS Parser — оновлення новин

# Запускається кожні 30 хвилин або вручну через GitHub UI
on:
  schedule:
    - cron: '*/30 * * * *'   # кожні 30 хвилин
  workflow_dispatch:

permissions:
  contents: write

# Окрема черга від deploy.yml — не блокуємо один одного
concurrency:
  group: "rss-parser"
  cancel-in-progress: true

jobs:
  parse-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4

      - name: Parse RSS feeds
        run: python scripts/parse_rss.py

      - name: Commit data files if changed
        id: commit
        run: |
          git config user.name  "CSTL News Bot"
          git config user.email "bot@cstl-news"
          git add data/articles.json data/events.json
          if git diff --staged --quiet; then
            echo "Нових матеріалів немає — деплой не потрібен"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "auto(news): оновлення новин та подій $(date -u +'%d.%m %H:%M UTC')"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Якщо є нові матеріали — запускаємо деплой
      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
