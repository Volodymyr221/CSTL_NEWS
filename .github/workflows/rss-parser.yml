name: RSS Parser — оновлення новин

# Запускається кожні 30 хвилин або вручну через GitHub UI
on:
  schedule:
    - cron: '*/30 * * * *'   # кожні 30 хвилин
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Окрема черга від deploy.yml — не блокуємо один одного
concurrency:
  group: "rss-parser"
  cancel-in-progress: true

jobs:
  parse-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # повна історія для git rev-list --count

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install feedparser
        run: pip install feedparser

      - name: Parse RSS feeds
        run: python scripts/parse_rss.py

      - name: Commit articles.json if changed
        id: commit
        run: |
          git config user.name  "CSTL News Bot"
          git config user.email "bot@cstl-news"
          git add data/articles.json
          if git diff --staged --quiet; then
            echo "Нових статей немає — деплой не потрібен"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "auto(news): оновлення новин $(date -u +'%d.%m %H:%M UTC')"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Якщо є нові статті — збираємо і деплоїмо самостійно
      - name: Setup Node.js
        if: steps.commit.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build bundle.js
        if: steps.commit.outputs.changed == 'true'
        run: npm install && node build.js

      - name: Update deploy version stamp
        if: steps.commit.outputs.changed == 'true'
        run: |
          DEPLOY_TIME=$(TZ='Europe/Kyiv' date '+%d.%m %H:%M')
          BUILD_NUM=$(git rev-list --count HEAD)
          sed -i "s|v[0-9]\+ · [0-9][0-9]\.[0-9][0-9] [0-9][0-9]:[0-9][0-9]|v${BUILD_NUM} · ${DEPLOY_TIME}|" index.html

      - name: Setup Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
