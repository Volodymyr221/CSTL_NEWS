name: RSS Parser — оновлення новин

# Запускається кожні 30 хвилин (рівно о :00 і :30) або вручну через GitHub UI
on:
  schedule:
    - cron: '0,30 * * * *'   # кожні 30 хвилин — GitHub надійно виконує такі cron-jobs
  workflow_dispatch:

permissions:
  contents: write
  actions: write

# Окрема черга від deploy.yml — не блокуємо один одного
concurrency:
  group: "rss-parser"
  cancel-in-progress: true

jobs:
  parse-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0   # повна історія — потрібна для rebase перед пушем

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4 lxml

      - name: Parse RSS feeds
        run: python scripts/parse_rss.py

      # Монітор здоров'я даних (рішення Роми 01.07) — пише HEALTH.md лише при зміні стану
      - name: Health check
        run: python scripts/health_check.py

      - name: Commit data files if changed
        id: commit
        run: |
          git config user.name  "CSTL News Bot"
          git config user.email "bot@cstl-news"
          git add data/articles.json data/events.json "CSTL NEWS VOVA/_ai-tools/HEALTH.md"
          if git diff --staged --quiet; then
            echo "Нових матеріалів немає — деплой не потрібен"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "auto(news): оновлення новин та подій $(date -u +'%d.%m %H:%M UTC')"
            # Пуш із ре-базою: main міг піти вперед (мерджі/деплой/інший бот) поки
            # парсили → інакше non-fast-forward «fetch first». До 5 спроб.
            pushed=false
            for i in 1 2 3 4 5; do
              if git push origin main; then pushed=true; break; fi
              echo "Пуш $i відхилено (main пішов уперед) — rebase і повтор…"
              git fetch origin main
              git rebase origin/main || { echo "Конфлікт rebase — стоп"; exit 1; }
              sleep 2
            done
            [ "$pushed" = true ] || { echo "Пуш не вдався після 5 спроб"; exit 1; }
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Якщо є нові матеріали — запускаємо деплой
      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
