name: AI News Agent — підготовка новин у чергу

# AI-агент (Anthropic Sonnet + web_search) шукає новини З ЗАПАСОМ і кладе їх у
# ЧЕРГУ (data/news_queue.json). Публікує їх окремий workflow (news-publisher)
# крапельно. Так дорогий AI працює рідко (раз на 6 год), а стрічка «жива» весь час.
on:
  schedule:
    - cron: '15 */6 * * *'   # кожні 6 годин (о :15)
  workflow_dispatch:
    inputs:
      mission:
        description: 'Місія (порожньо = Громада)'
        required: false
        default: 'Громада'

permissions:
  contents: write

concurrency:
  group: "ai-news-agent"
  cancel-in-progress: true

jobs:
  ai-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0   # повна історія — потрібна для rebase перед пушем

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4 lxml

      - name: Run AI news agent (fill queue)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/ai_news_agent.py --mission "${{ github.event.inputs.mission || 'Громада' }}"

      - name: Commit queue if changed
        run: |
          git config user.name  "CSTL AI Agent"
          git config user.email "ai-agent@cstl-news"
          git add data/news_queue.json data/ai_spend.json
          if git diff --staged --quiet; then
            echo "Черга без змін."
          else
            git commit -m "ai(queue): черга+витрати $(date -u +'%d.%m %H:%M UTC')"
            # Пуш із ре-базою: main міг піти вперед поки готували чергу → уникаємо «fetch first».
            pushed=false
            for i in 1 2 3 4 5; do
              if git push origin main; then pushed=true; break; fi
              echo "Пуш $i відхилено (main пішов уперед) — rebase і повтор…"
              git fetch origin main
              git rebase origin/main || { echo "Конфлікт rebase — стоп"; exit 1; }
              sleep 2
            done
            [ "$pushed" = true ] || { echo "Пуш не вдався після 5 спроб"; exit 1; }
          fi
