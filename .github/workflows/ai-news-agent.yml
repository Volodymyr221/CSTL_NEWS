name: AI News Agent — чернетки Громади в кабінет

# AI-агент (Anthropic Sonnet + web_search) пише оригінальні матеріали Громади і
# кладе їх ЧЕРНЕТКАМИ в кабінет (Supabase cms_articles) — Алла ревʼю/публікує.
# Волинь/Україну/Світ дає RSS-парсер окремо. Пише памʼять (щоб не повторюватись).
# Без ключа Supabase — чернетки тримаються у файлі data/editor_drafts.json.
on:
  schedule:
    # Щогодини (о :15): Алла/Рома опублікували → агент за ≤1 год сам доливає до ~10.
    # Порожні прогони безкоштовні: кабінет повний → один REST-рахунок, БЕЗ виклику AI.
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      mission:
        description: 'Місія (порожньо = Громада)'
        required: false
        default: 'Громада'

permissions:
  contents: write

concurrency:
  group: "ai-news-agent"
  cancel-in-progress: true

jobs:
  ai-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0   # повна історія — потрібна для rebase перед пушем

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4 lxml

      - name: Run AI news agent (drafts → cabinet)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/ai_news_agent.py --mission "${{ github.event.inputs.mission || 'Громада' }}"

      - name: Commit memory/drafts if changed
        run: |
          git config user.name  "CSTL AI Agent"
          git config user.email "ai-agent@cstl-news"
          for f in data/hromada_memory.json data/editor_drafts.json data/ai_spend.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "Без змін."
          else
            git commit -m "ai(news): памʼять+чернетки+витрати $(date -u +'%d.%m %H:%M UTC')"
            # Пуш із ре-базою: main міг піти вперед поки готували чергу → уникаємо «fetch first».
            pushed=false
            for i in 1 2 3 4 5; do
              if git push origin main; then pushed=true; break; fi
              echo "Пуш $i відхилено (main пішов уперед) — rebase і повтор…"
              git fetch origin main
              git rebase origin/main || { echo "Конфлікт rebase — стоп"; exit 1; }
              sleep 2
            done
            [ "$pushed" = true ] || { echo "Пуш не вдався після 5 спроб"; exit 1; }
          fi
