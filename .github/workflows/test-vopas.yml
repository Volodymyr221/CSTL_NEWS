# Тест доступу до vopas.com.ua з GitHub Actions runner.
# Запускати ВРУЧНУ через UI (Actions → "Test VOPAS access" → Run workflow).
# Один прогін → дізнаємось чи рунер бачить розклад. На основі цього
# вирішуємо чи писати повноцінний парсер чи шукати інший шлях.

name: Test VOPAS access

on:
  workflow_dispatch: {}  # тільки ручний запуск

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run VOPAS access probe
        run: python scripts/test_vopas_access.py
        continue-on-error: true  # навіть якщо exit 1 — хочемо побачити artifact

      - name: Dump HTML preview to logs
        if: always()
        run: |
          if [ -f tmp_vopas_response.html ]; then
            echo "=== РОЗМІР HTML ==="
            wc -c tmp_vopas_response.html
            echo ""
            echo "=== СТРУКТУРА КАРТКИ РЕЙСУ (3500 символів навколо першого result-date) ==="
            python3 -c "
            import re
            with open('tmp_vopas_response.html', 'r', encoding='utf-8') as f:
                text = f.read()
            for marker in ['result-date', 'result-cols', 'result-time', '06:50', 'class=\"row']:
                m = re.search(re.escape(marker), text)
                if m:
                    start = max(0, m.start() - 500)
                    print(f'-- знайдено маркер: {marker} на позиції {m.start()} --')
                    print(text[start:start+3500])
                    break
            else:
                print('Жоден маркер не знайдено')
            "
            echo ""
            echo "=== ВСІ УНІКАЛЬНІ result-* КЛАСИ ==="
            grep -oE 'class="[^"]*result-[^"]*"' tmp_vopas_response.html | sort -u | head -30
            echo ""
            echo "=== ВСІ УНІКАЛЬНІ title-state-* КЛАСИ ==="
            grep -oE 'class="[^"]*title-state-[^"]*"' tmp_vopas_response.html | sort -u | head -20
          else
            echo "HTML файл не знайдено — щось пішло не так у Python скрипті"
          fi

      - name: Upload HTML response (if any was saved)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vopas-response
          path: tmp_vopas_response.html
          if-no-files-found: ignore
          retention-days: 7
