name: News Publisher — крапельна публікація з черги

# Бере кілька найсвіжіших статей із черги (data/news_queue.json, наповнює
# ai-news-agent) → у стрічку (data/articles.json) → деплой. Запускається частіше
# за агента, щоб новини з'являлись по черзі, а не всі одразу.
on:
  schedule:
    - cron: '0 */2 * * *'    # кожні 2 години
  workflow_dispatch:
    inputs:
      count:
        description: 'Скільки статей викласти за раз'
        required: false
        default: '2'

permissions:
  contents: write
  actions: write

concurrency:
  group: "news-publisher"
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4 lxml

      - name: Publish from queue
        run: python scripts/publish_queue.py --count "${{ github.event.inputs.count || '2' }}"

      - name: Health check
        run: python scripts/health_check.py

      - name: Commit data files if changed
        id: commit
        run: |
          git config user.name  "CSTL News Bot"
          git config user.email "bot@cstl-news"
          git add data/articles.json data/news_queue.json "CSTL NEWS VOVA/_ai-tools/HEALTH.md"
          if git diff --staged --quiet; then
            echo "Нічого публікувати — деплой не потрібен"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "news: публікація з черги $(date -u +'%d.%m %H:%M UTC')"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
