name: Deploy CSTL NEWS to GitHub Pages

on:
  push:
    branches:
      - 'claude/**'
      - 'main'

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge feature branch into main (якщо пуш не в main)
        if: github.ref_name != 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-edit -X theirs ${{ github.ref_name }}

      - name: Update deploy timestamp (час деплою)
        run: |
          DEPLOY_TIME=$(TZ='Europe/Kyiv' date '+%d.%m %H:%M')
          sed -i "s|v[0-9]* · [0-9][0-9]\.[0-9][0-9] [0-9][0-9]:[0-9][0-9]|v1 · ${DEPLOY_TIME}|" index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: deploy · ${DEPLOY_TIME}"

      - name: Install dependencies and build
        run: |
          npm ci
          node build.js

      - name: Commit bundle and push to main
        run: |
          git add bundle.js -f
          git diff --staged --quiet || git commit -m "build: bundle.js"
          git push origin main

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
