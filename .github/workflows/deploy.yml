name: Deploy CSTL NEWS to GitHub Pages

on:
  push:
    branches:
      - 'claude/**'
      - 'main'

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge feature branch into main (якщо пуш не в main)
        if: github.ref_name != 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-edit -X theirs ${{ github.ref_name }}

      - name: Install dependencies and build
        run: |
          npm install
          node build.js

      - name: Commit bundle and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bundle.js -f
          git diff --staged --quiet || git commit -m "build: bundle.js"
          git pull --rebase origin main
          git push origin main
