<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#C41E3A">
  <meta name="description" content="CSTL NEWS — локальна медіа-платформа Олики та Волині">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CSTL NEWS">
  <title>CSTL NEWS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Splash screen (заставка при завантаженні) -->
  <div id="splash">
    <img src="logo.png" class="splash-icon" alt="Olyka Castle">
    <div class="splash-logo">CSTL NEWS</div>
    <div class="splash-sub">Олика · Волинь · Україна</div>
  </div>

  <!-- Шапка сайту -->
  <header class="app-header">
    <div class="header-logo">CSTL <span>NEWS</span></div>
    <div class="header-badge" id="deploy-version">v1 · 07.04 23:29</div>
  </header>

  <!-- Основний контент -->
  <main class="app-main">

    <!-- Вкладка: Новини -->
    <div id="page-news" class="page active">
      <div class="filters-bar">
        <div id="geo-filters" class="chips-row"></div>
        <div id="topic-filters" class="chips-row"></div>
      </div>
      <div id="news-list" class="news-list"></div>
    </div>

    <!-- Вкладка: Події -->
    <div id="page-events" class="page" style="display:none">
      <div class="tab-header">
        <h2 class="tab-title">Події</h2>
        <p class="tab-subtitle">Афіша Олики та Волині</p>
      </div>
      <div id="events-list" class="events-list"></div>
    </div>

    <!-- Вкладка: Автобуси -->
    <div id="page-buses" class="page" style="display:none">
      <div class="tab-header">
        <h2 class="tab-title">Автобуси</h2>
        <p class="tab-subtitle">Маршрути через Олику</p>
      </div>
      <div id="buses-content"></div>
    </div>

    <!-- Вкладка: Подати новину -->
    <div id="page-submit" class="page" style="display:none">
      <div class="tab-header">
        <h2 class="tab-title">Подати новину</h2>
        <p class="tab-subtitle">Маєш чим поділитись? Розкажи нам!</p>
      </div>

      <form id="submit-form" class="submit-form">
        <div class="form-group">
          <label class="form-label">Ім'я (необов'язково)</label>
          <input id="submit-name" class="form-input" type="text" placeholder="Ваше ім'я">
        </div>
        <div class="form-group">
          <label class="form-label">Контакт (необов'язково)</label>
          <input id="submit-contact" class="form-input" type="text" placeholder="Телефон або Instagram">
        </div>
        <div class="form-group">
          <label class="form-label">Новина або посилання *</label>
          <textarea id="submit-text" class="form-textarea"
            placeholder="Опишіть що сталось або вставте посилання на джерело"
            rows="5"></textarea>
        </div>
        <button type="submit" class="submit-btn">Надіслати до редакції</button>
        <p class="submit-note">Ваша допомога допомагає нам рухатись в правильному напрямку!</p>
      </form>
    </div>

  </main>

  <!-- Модальне вікно статті (відкривається при натисканні на новину) -->
  <div id="article-modal" class="article-modal" onclick="if(event.target===this)closeArticleModal()">
    <div class="article-modal-inner">
      <button class="modal-close-btn" onclick="closeArticleModal()">✕</button>
      <div id="article-modal-content" class="article-modal-content"></div>
    </div>
  </div>

  <!-- Нижня навігація (tab bar) -->
  <nav class="tab-bar">
    <button class="tab-item active" data-tab="news" onclick="switchTab('news')">
      <span class="tab-icon">📰</span>
      <span class="tab-label">Новини</span>
    </button>
    <button class="tab-item" data-tab="events" onclick="switchTab('events')">
      <span class="tab-icon">🎭</span>
      <span class="tab-label">Події</span>
    </button>
    <button class="tab-item" data-tab="buses" onclick="switchTab('buses')">
      <span class="tab-icon">🚌</span>
      <span class="tab-label">Автобуси</span>
    </button>
    <button class="tab-item" data-tab="submit" onclick="switchTab('submit')">
      <span class="tab-icon">✍️</span>
      <span class="tab-label">Подати</span>
    </button>
  </nav>

  <!-- Toast повідомлення (маленьке сповіщення знизу) -->
  <div id="cstl-toast" class="toast"></div>

  <script src="bundle.js"></script>
</body>
</html>
