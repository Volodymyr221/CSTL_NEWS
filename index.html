<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CSTL NEWS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-logo">CSTL <span>NEWS</span></div>
        <div class="header-badge" id="weather-widget">
            <span class="weather-temp">☀️ --°</span>
            <span class="weather-city">Олика</span>
        </div>
    </header>

    <main class="app-content">
        <div class="filters-bar">
            <div class="chips-row">
                <div class="chip active">Всі</div>
                <div class="chip">Олика</div>
                <div class="chip">Волинь</div>
                <div class="chip">Україна</div>
                <div class="chip">Світ</div>
            </div>
        </div>

        <div id="news-container" class="news-list">
            </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <img src="icons/news.svg" alt="">
            <span>Новини</span>
        </a>
        <a href="events.html" class="nav-item">
            <img src="icons/events.svg" alt="">
            <span>Події</span>
        </a>
        <a href="#" class="nav-item">
            <img src="icons/bus.svg" alt="">
            <span>Автобуси</span>
        </a>
        <a href="#" class="nav-item">
            <img src="icons/submit.svg" alt="">
            <span>Подати</span>
        </a>
    </nav>

    <script src="src/app.js"></script>
</body>
</html>
