<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#722F37">
  <meta name="description" content="CSTL LIFE — локальна медіа-платформа Олики та Волині">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CSTL LIFE">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>CSTL LIFE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Splash screen (заставка при завантаженні) -->
  <div id="splash">
    <img src="logo.png" class="splash-icon" alt="Olyka Castle">
    <div class="splash-logo">CSTL LIFE</div>
    <div class="splash-sub">Олика · Волинь · Україна</div>
  </div>

  <!-- Шапка сайту -->
  <header class="app-header">
    <!-- Ліва група: бургер + лого впритул (рішення Роми 08.07). Погоду з шапки
         прибрано (лишилась блоком на Громаді); лічильник версії — по центру шапки. -->
    <!-- Розклад шапки (рішення Вови 16.07): лого вліво; справа — закладка, бургер
         у самий правий край. Іконка кабінету — біля привітання на Громаді. -->
    <div class="header-left">
      <div class="header-logo">CSTL <span>LIFE</span></div>
    </div>
    <div class="deploy-stamp">v1 · 01.01 00:00</div>
    <div class="header-right">
      <button class="saved-hub-btn" id="saved-hub-btn" type="button" aria-label="Збережені">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="Меню" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Бічне меню (сайдбар). Наповнення й логіка — src/core/sidebar.js -->
  <div class="sidebar-overlay" id="sidebar-overlay" hidden></div>
  <aside class="sidebar" id="sidebar" aria-hidden="true">
    <div class="sidebar-head">
      <div class="sidebar-logo">CSTL <span>LIFE</span></div>
      <button class="sidebar-close" id="sidebar-close" type="button" aria-label="Закрити">✕</button>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
  </aside>

  <!-- Основний контент -->
  <main class="app-main" data-tab="community">

    <!-- Вкладка: Громада (головна) -->
    <div id="page-community" class="page active">
      <div id="cm-content" class="cm-content"></div>
    </div>

    <!-- Вкладка: «Стрічка» — сторінки-канали громади (мінісоцмережа).
         Кружечки-канали (stories) + вертикальна стрічка постів. Рендерить feed.js. -->
    <div id="page-shotam" class="page" style="display:none">
      <div class="fd-topbar">
        <div id="feed-circles" class="fd-circles-wrap"></div>
      </div>
      <div id="feed-list" class="fd-list"></div>
    </div>

    <!-- Вкладка: Автобуси -->
    <div id="page-buses" class="page" style="display:none">
      <div id="buses-content"></div>
    </div>

    <!-- Вкладка: Світло. Прихована з tab-bar 16.05.2026 (наразі не актуально).
         Залишена в DOM щоб switchTab('power') не падав, якщо викликати програмно.
         Щоб повернути в навігацію — розкоментуй кнопку в tab-bar нижче. -->
    <div id="page-power" class="page" style="display:none">
      <div id="power-content"></div>
    </div>

    <!-- Вкладка: Дошка громади -->
    <div id="page-board" class="page" style="display:none">
      <div class="board-bg" aria-hidden="true"></div>
      <div id="board-content" class="board-content"></div>
    </div>

    <!-- Вкладка: Чати (хаб спілкування) -->
    <div id="page-chats" class="page" style="display:none">
      <div class="chats-hub">
        <h1 class="chats-hub-title">Обговорення</h1>

        <!-- V2: «Повідомлення» (приватний чат) і «Групи» приховані до версії 2.
             Код і хендлери (data-chats у app.js, messages-ui.js) лишаються робочими —
             приховано лише кнопки через display:none (не видалено). -->
        <button class="chats-entry" type="button" data-chats="messages" style="display:none">
          <span class="chats-entry-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          </span>
          <span class="chats-entry-body">
            <span class="chats-entry-name">Повідомлення</span>
            <span class="chats-entry-sub">Приватні листування 1-на-1</span>
          </span>
          <span class="chats-entry-arrow">›</span>
        </button>

        <button class="chats-entry" type="button" data-chats="groups" style="display:none">
          <span class="chats-entry-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9.5" cy="7" r="3.5"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.5a3.5 3.5 0 0 1 0 6.8"/></svg>
          </span>
          <span class="chats-entry-body">
            <span class="chats-entry-name">Групи</span>
            <span class="chats-entry-sub">Приватні чати спільнот і сіл</span>
          </span>
          <span class="chats-entry-arrow">›</span>
        </button>

        <button class="chats-entry" type="button" data-chats="discussions">
          <span class="chats-entry-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l16-5v12L3 14z"/><path d="M11.5 16.5a2.5 2.5 0 0 1-4.7-.9"/></svg>
          </span>
          <span class="chats-entry-body">
            <span class="chats-entry-name">Обговорення</span>
            <span class="chats-entry-sub">Публічні теми громади</span>
          </span>
          <span class="chats-entry-arrow">›</span>
        </button>
      </div>
    </div>

    <!-- Вкладка: Обговорення — СПРАВЖНЯ сторінка (не overlay), тому таб-бар завжди
         видимий і навігація нативна. Рендериться board.js у #disc-content (той самий
         рушій карток/реакцій/коментарів/realtime). Хаб #page-chats вище — осиротілий,
         лишений схованим під V2 (Повідомлення/Групи). -->
    <div id="page-discussions" class="page" style="display:none">
      <div id="disc-content" class="board-content"></div>
    </div>

  </main>

  <!-- Модальне вікно статті (відкривається при натисканні на новину) -->
  <div id="article-modal" class="article-modal" onclick="if(event.target===this)closeArticleModal()">
    <div class="article-modal-inner">
      <div class="modal-sticky-header">
        <div class="modal-handle"></div>
        <div class="modal-icon-group">
          <button class="modal-icon-btn" id="modal-share-btn" type="button" aria-label="Поділитись"></button>
          <button class="modal-icon-btn" id="modal-remind-btn" type="button" aria-label="Нагадування" hidden></button>
          <button class="modal-icon-btn" id="modal-save-btn" type="button" aria-label="Зберегти" hidden></button>
        </div>
        <button class="modal-close-btn" onclick="closeArticleModal()">✕</button>
        <div class="modal-meta-tags" id="modalMetaTags"></div>
      </div>
      <div id="article-modal-content" class="article-modal-content"></div>
    </div>
  </div>

  <!-- Нижня навігація (tab bar) — порядок (Вова 22.07): зліва інформація, справа сервіси.
       Стрічка · Обговорення · [Громада] · Дошка · Автобуси. -->
  <nav class="tab-bar">
    <button class="tab-item" data-tab="shotam" onclick="switchTab('shotam')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 6h3a1 1 0 0 1 1 1v11a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-14a1 1 0 0 1 1 -1h11a1 1 0 0 1 1 1v13"/>
        <path d="M8 8l4 0"/>
        <path d="M8 12l4 0"/>
        <path d="M8 16l4 0"/>
      </svg>
      <span class="tab-label">Стрічка</span>
    </button>
    <button class="tab-item" data-tab="discussions" onclick="switchTab('discussions')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 9h8"/>
        <path d="M8 13h6"/>
        <path d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12z"/>
      </svg>
      <span class="tab-label">Обговорення</span>
    </button>
    <button class="tab-item tab-item--home active" data-tab="community" onclick="switchTab('community')">
      <div class="tab-home-circle">
        <img src="icons/castle-icon.png" class="tab-castle-icon" alt="Громада">
      </div>
      <span class="tab-label tab-label--home">Громада</span>
    </button>
    <button class="tab-item" data-tab="board" onclick="switchTab('board')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"/>
        <path d="M9 3m0 2a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v0a2 2 0 0 1 -2 2h-2a2 2 0 0 1 -2 -2z"/>
        <path d="M9 12l.01 0"/>
        <path d="M13 12l2 0"/>
        <path d="M9 16l.01 0"/>
        <path d="M13 16l2 0"/>
      </svg>
      <span class="tab-label">Дошка</span>
    </button>
    <button class="tab-item" data-tab="buses" onclick="switchTab('buses')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 17a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
        <path d="M16 17a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
        <path d="M4 17h-2v-11a1 1 0 0 1 1 -1h14a5 7 0 0 1 5 7v5h-2m-4 0h-8"/>
        <path d="M16 5l1.5 7l4.5 0"/>
        <path d="M2 10l15 0"/>
        <path d="M7 5l0 5"/>
        <path d="M12 5l0 5"/>
      </svg>
      <span class="tab-label">Автобуси</span>
    </button>
    <!-- Кнопка «Світло» прихована 16.05.2026 (не актуально, світло не відключають).
         Щоб повернути — розкоментуй блок і постав у потрібну позицію.
    <button class="tab-item" data-tab="power" onclick="switchTab('power')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span class="tab-label">Світло</span>
    </button>
    -->
  </nav>

  <!-- Toast повідомлення (маленьке сповіщення знизу) -->
  <div id="cstl-toast" class="toast"></div>

  <!-- Supabase SDK (Фаза 9: Дошка громади 2.0) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- GoatCounter аналітика (DAU/MAU без cookies, privacy-first) -->
  <script data-goatcounter="https://cstl-life.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script src="bundle.js"></script>
</body>
</html>
