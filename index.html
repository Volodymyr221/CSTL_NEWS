<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#722F37">
  <meta name="description" content="CSTL LIFE — локальна медіа-платформа Олики та Волині">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CSTL LIFE">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>CSTL LIFE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Splash screen (заставка при завантаженні) -->
  <div id="splash">
    <img src="logo.png" class="splash-icon" alt="Olyka Castle">
    <div class="splash-logo">CSTL LIFE</div>
    <div class="splash-sub">Олика · Волинь · Україна</div>
  </div>

  <!-- Шапка сайту -->
  <header class="app-header">
    <div class="header-logo">CSTL <span>LIFE</span></div>
    <div class="header-right">
      <button class="account-btn" id="account-btn" type="button" aria-label="Увійти">
        <svg viewBox="0 0 24 24" width="25" height="25" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </button>
      <button class="saved-routes-btn" id="saved-routes-btn" type="button" hidden aria-label="Збережені рейси">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span class="saved-routes-count" id="saved-routes-count"></span>
      </button>
      <div class="header-meta">
        <div class="weather-widget" id="weather-widget">
          <span class="weather-icon" id="weather-icon"></span>
          <span class="weather-city" id="weather-city"></span>
          <span class="weather-temp" id="weather-temp"></span>
        </div>
        <div class="deploy-stamp">v1 · 01.01 00:00</div>
      </div>
    </div>
  </header>

  <!-- Основний контент -->
  <main class="app-main" data-tab="community">

    <!-- Вкладка: Громада (головна) -->
    <div id="page-community" class="page active">
      <div id="cm-content" class="cm-content"></div>
    </div>

    <!-- Вкладка: Новини (містить 2 підрозділи: Новини | Події) -->
    <div id="page-news" class="page" style="display:none">
      <!-- Сегмент-перемикач (фіксований під шапкою) -->
      <div class="news-seg">
        <button class="news-seg-btn active" type="button" data-news-seg="news">📰 Новини</button>
        <button class="news-seg-btn" type="button" data-news-seg="events">📅 Події</button>
      </div>

      <!-- Підрозділ: Новини -->
      <div id="news-seg-news" class="news-seg-pane">
        <div class="filters-bar">
          <div id="geo-filters" class="chips-row"></div>
        </div>
        <div id="news-list" class="news-list"></div>
      </div>

      <!-- Підрозділ: Події (перенесено сюди зі старої вкладки «Події») -->
      <div id="news-seg-events" class="news-seg-pane" style="display:none">
        <div class="events-filters-bar">
          <div id="events-calendar" class="events-calendar"></div>
          <div id="events-filters" class="chips-row"></div>
        </div>
        <div id="events-list" class="events-list"></div>
      </div>
    </div>

    <!-- Стара вкладка «Події» — спорожнена; контент переїхав у «Новини».
         div лишаємо щоб switchTab('events') не падав (перенаправляється у news). -->
    <div id="page-events" class="page" style="display:none"></div>

    <!-- Вкладка: Автобуси -->
    <div id="page-buses" class="page" style="display:none">
      <div id="buses-content"></div>
    </div>

    <!-- Вкладка: Світло. Прихована з tab-bar 16.05.2026 (наразі не актуально).
         Залишена в DOM щоб switchTab('power') не падав, якщо викликати програмно.
         Щоб повернути в навігацію — розкоментуй кнопку в tab-bar нижче. -->
    <div id="page-power" class="page" style="display:none">
      <div id="power-content"></div>
    </div>

    <!-- Вкладка: Дошка громади -->
    <div id="page-board" class="page" style="display:none">
      <div class="board-bg" aria-hidden="true"></div>
      <div id="board-content" class="board-content"></div>
    </div>

    <!-- Вкладка: Чати (хаб спілкування) -->
    <div id="page-chats" class="page" style="display:none">
      <div class="chats-hub">
        <h1 class="chats-hub-title">Чати</h1>

        <button class="chats-entry" type="button" data-chats="messages">
          <span class="chats-entry-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          </span>
          <span class="chats-entry-body">
            <span class="chats-entry-name">Повідомлення</span>
            <span class="chats-entry-sub">Приватні листування 1-на-1</span>
          </span>
          <span class="chats-entry-arrow">›</span>
        </button>

        <button class="chats-entry" type="button" data-chats="groups">
          <span class="chats-entry-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9.5" cy="7" r="3.5"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.5a3.5 3.5 0 0 1 0 6.8"/></svg>
          </span>
          <span class="chats-entry-body">
            <span class="chats-entry-name">Групи</span>
            <span class="chats-entry-sub">Приватні чати спільнот і сіл</span>
          </span>
          <span class="chats-entry-arrow">›</span>
        </button>

        <button class="chats-entry" type="button" data-chats="discussions">
          <span class="chats-entry-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l16-5v12L3 14z"/><path d="M11.5 16.5a2.5 2.5 0 0 1-4.7-.9"/></svg>
          </span>
          <span class="chats-entry-body">
            <span class="chats-entry-name">Обговорення</span>
            <span class="chats-entry-sub">Публічні теми громади</span>
          </span>
          <span class="chats-entry-arrow">›</span>
        </button>
      </div>
    </div>

  </main>

  <!-- Обговорення — повноекранний overlay поверх вкладки «Чати» (варіант Б).
       Рендериться board.js у #disc-content (той самий рушій карток/реакцій/realtime),
       але таб-бар лишається на «Чати», а не на «Дошці». -->
  <div id="page-discussions" class="disc-screen" hidden>
    <div id="disc-content" class="board-content"></div>
  </div>

  <!-- Модальне вікно статті (відкривається при натисканні на новину) -->
  <div id="article-modal" class="article-modal" onclick="if(event.target===this)closeArticleModal()">
    <div class="article-modal-inner">
      <div class="modal-sticky-header">
        <div class="modal-handle"></div>
        <button class="modal-close-btn" onclick="closeArticleModal()">✕</button>
        <div class="modal-meta-tags" id="modalMetaTags"></div>
      </div>
      <div id="article-modal-content" class="article-modal-content"></div>
    </div>
  </div>

  <!-- Нижня навігація (tab bar) -->
  <nav class="tab-bar">
    <button class="tab-item" data-tab="buses" onclick="switchTab('buses')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5" fill="currentColor" stroke="none"/>
      </svg>
      <span class="tab-label">Автобуси</span>
    </button>
    <button class="tab-item" data-tab="board" onclick="switchTab('board')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="16" rx="2"/>
        <path d="M9 5V3h6v2"/>
        <path d="M7 10h10M7 14h10M7 18h6"/>
      </svg>
      <span class="tab-label">Дошка</span>
    </button>
    <button class="tab-item tab-item--home active" data-tab="community" onclick="switchTab('community')">
      <div class="tab-home-circle">
        <img src="icons/castle-icon.png" class="tab-castle-icon" alt="Громада">
      </div>
      <span class="tab-label tab-label--home">Громада</span>
    </button>
    <button class="tab-item" data-tab="chats" onclick="switchTab('chats')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
      <span class="tab-label">Чати</span>
    </button>
    <!-- Кнопка «Світло» прихована 16.05.2026 (не актуально, світло не відключають).
         Щоб повернути — розкоментуй блок нижче.
    <button class="tab-item" data-tab="power" onclick="switchTab('power')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span class="tab-label">Світло</span>
    </button>
    -->
    <button class="tab-item" data-tab="news" onclick="switchTab('news')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v14a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-7"/>
        <path d="M10 8h8M10 12h6M10 16h4"/>
      </svg>
      <span class="tab-label">Новини</span>
    </button>
  </nav>

  <!-- Toast повідомлення (маленьке сповіщення знизу) -->
  <div id="cstl-toast" class="toast"></div>

  <!-- Supabase SDK (Фаза 9: Дошка громади 2.0) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- GoatCounter аналітика (DAU/MAU без cookies, privacy-first) -->
  <script data-goatcounter="https://cstl-life.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script src="bundle.js"></script>
</body>
</html>
